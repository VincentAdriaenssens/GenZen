server {
    listen 80;
    server_name generationzen.fr www.generationzen.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name api.generationzen.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name generationzen.fr www.generationzen.fr;

    ssl_certificate /etc/letsencrypt/live/generationzen.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/generationzen.fr/privkey.pem;

    location / {
        proxy_pass http://site-statique:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.generationzen.fr;

    ssl_certificate /etc/letsencrypt/live/api.generationzen.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.generationzen.fr/privkey.pem;

    location / {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name app.generationzen.fr;

    ssl_certificate /etc/letsencrypt/live/app.generationzen.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.generationzen.fr/privkey.pem;

    location / {
        proxy_pass http://vitrine:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}