stages:
  - deploy

variables:
  REGISTRY: registry.gitlab.com/univlille/startupweek/2026/groupe-11/deploy

# ─── DEPLOY BACKEND + NGINX + SITE STATIQUE ──────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - ssh root@$VPS_HOST "
        if ! command -v docker &> /dev/null; then
          apt-get update -qq &&
          curl -fsSL https://get.docker.com | sh &&
          systemctl enable docker &&
          systemctl start docker;
        fi
      "
    - scp docker-compose.yml root@$VPS_HOST:/app/docker-compose.yml
    - ssh root@$VPS_HOST "
        mkdir -p /app &&
        echo '$GROUP_REGISTRY_PASSWORD' | docker login -u $GROUP_REGISTRY_USER --password-stdin registry.gitlab.com &&
        cd /app &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  only:
    - main

# ─── DEPLOY VITRINE (front-js) ──────────────────────────────────────────────────────────
deploy:vitrine:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan $VPS_HOST >> ~/.ssh/known_hosts
  script:
    - ssh root@$VPS_HOST "
        echo '$GROUP_REGISTRY_PASSWORD' | docker login -u $GROUP_REGISTRY_USER --password-stdin registry.gitlab.com &&
        docker compose -f /app/docker-compose.yml pull vitrine &&
        docker compose -f /app/docker-compose.yml up -d --no-deps vitrine
      "
  only:
    - main